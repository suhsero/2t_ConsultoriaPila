<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultoría Pila | Soluciones Tecnológicas Avanzadas</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            light: '#60a5fa',
                            DEFAULT: '#3b82f6',
                            dark: '#2563eb',
                        },
                        spotify: {
                            base: '#121212',
                            elevated: '#181818',
                            highlight: '#282828',
                            text: '#b3b3b3',
                        }
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-spotify-base text-white font-sans antialiased flex flex-col min-h-screen">
    <header class="bg-black sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row justify-between items-center py-4 md:py-0 md:h-20 gap-4 md:gap-0">
                <div class="flex-shrink-0 flex items-center gap-2 cursor-pointer" onclick="window.scrollTo(0,0)">
                    <img src="logo.png" alt="Logo Consultoría Pila" class="h-10 w-auto">
                    <span class="font-bold text-2xl text-white tracking-tight">Consultoría<span class="text-brand">Pila</span></span>
                </div>
                <nav class="flex flex-wrap justify-center gap-4 md:gap-8" aria-label="Menú principal">
                    <a href="#inicio" class="text-spotify-text hover:text-white transition-colors font-medium">Inicio</a>
                    <a href="#servicios" class="text-spotify-text hover:text-white transition-colors font-medium">Servicios</a>
                    <a href="#equipo" class="text-spotify-text hover:text-white transition-colors font-medium">Equipo</a>
                    <a href="#contacto" class="text-spotify-text hover:text-white transition-colors font-medium">Contacto</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="flex-grow">
        <section id="inicio" class="relative bg-spotify-base text-white overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-b from-spotify-highlight/40 to-spotify-base opacity-90"></div>
            <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop')] bg-cover bg-center mix-blend-overlay opacity-10"></div>
            
            <div class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-24 md:py-32 flex flex-col items-center text-center">
                <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight mb-6 text-white">
                    Transformamos su visión en <br class="block">
                    <span class="text-transparent bg-clip-text bg-gradient-to-r from-brand-light to-brand">Realidad Digital</span>
                </h1>
                <p class="mt-4 max-w-2xl text-lg md:text-xl text-spotify-text mb-10">
                    Somos su socio estratégico en tecnología. Ayudamos a empresas a escalar, asegurar e innovar a través de soluciones de software de vanguardia.
                </p>
                <div class="flex flex-col sm:flex-row gap-4">
                    <a href="#servicios" class="bg-brand hover:bg-brand-light text-white font-bold py-3 px-8 rounded-full transition-all shadow-lg hover:scale-105 transform">
                        Descubrir Servicios
                    </a>
                    <a href="#contacto" class="bg-transparent border border-spotify-text hover:border-white text-white font-bold py-3 px-8 rounded-full transition-all hover:scale-105 transform">
                        Hablar con un experto
                    </a>
                </div>
            </div>
        </section>
    </main>

    </body>
</html>
